<script>
"use strict";

const scene  = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
camera.position.z = 1;

const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const params = {
    dpr: 0.75,
    camSpeed: 0.10,
    beatBPM: 52,        // resting heart rate of the thing
    iterations: 14,
    rotX: 0.62,
    rotY: 2.18,
    rotZ: 0.51,
    kMult: 8.10,
    clampMin: -0.60,
    clampMax: 72.0,
    expandX: 0.30,
    expandY: 1.62,
    expandZ: 0.58,
    thickness: -1.85,
    bounds: 6.6
};
renderer.setPixelRatio(params.dpr);

const uniforms = {
    u_time:       { value: 0.0 },
    u_resolution: { value: new THREE.Vector2(innerWidth * params.dpr, innerHeight * params.dpr) },
    u_camSpeed:   { value: params.camSpeed },
    u_pulse:      { value: 0.0 },                 // heartbeat 0..1
    u_rage:       { value: 0.0 },                 // 0 calm .. 1 furious
    u_mouse:      { value: new THREE.Vector2(0, 0) },   // smoothed -1..1
    u_gaze:       { value: new THREE.Vector3(0, 0, -1) },// where the eye looks
    u_zoom:       { value: 1.0 },
    u_proximity:  { value: 0.0 },                 // 0 far .. 1 falling in
    u_shake:      { value: new THREE.Vector2(0, 0) },
    u_iterations: { value: params.iterations },
    u_rot:        { value: new THREE.Vector3(params.rotX, params.rotY, params.rotZ) },
    u_kMult:      { value: params.kMult },
    u_clamp:      { value: new THREE.Vector2(params.clampMin, params.clampMax) },
    u_expand:     { value: new THREE.Vector3(params.expandX, params.expandY, params.expandZ) },
    u_thickness:  { value: params.thickness },
    u_bounds:     { value: params.bounds }
};

const geometry = new THREE.PlaneGeometry(2, 2);

const vertexShader = `
    void main() { gl_Position = vec4(position, 1.0); }
`;

const fragmentShader = `
    precision highp float;

    uniform float u_time;
    uniform vec2  u_resolution;
    uniform float u_camSpeed;
    uniform float u_pulse;
    uniform float u_rage;
    uniform vec2  u_mouse;
    uniform vec3  u_gaze;
    uniform float u_zoom;
    uniform float u_proximity;
    uniform vec2  u_shake;
    uniform int   u_iterations;
    uniform vec3  u_rot;
    uniform float u_kMult;
    uniform vec2  u_clamp;
    uniform vec3  u_expand;
    uniform float u_thickness;
    uniform float u_bounds;

    mat2 rot(float a){ float s=sin(a), c=cos(a); return mat2(c,-s,s,c); }

    // Thorny infernal sigil — spherical-inversion KIFS, beating like a heart.
    float map(vec3 p){
        vec3 q = p;
        float scale = 2.3;

        // breathe / clench with the heartbeat (and harder when enraged) — kept subtle
        float beat = u_pulse * (0.04 + 0.16 * u_rage);
        q *= 1.0 - beat * 0.10;
        q += vec3(sin(u_time*0.4)*0.12, cos(u_time*0.3)*0.12, 0.0);

        float rage = u_rage;
        for(int i=0; i<20; i++){
            if(i >= u_iterations) break;
            q = abs(q);
            q.xy *= rot(u_rot.x + rage*0.12);
            q.xz *= rot(u_rot.y);
            q.yz *= rot(u_rot.z - rage*0.10);
            float r2 = dot(q,q);
            float k = u_kMult / clamp(r2, u_clamp.x, u_clamp.y);
            q *= k;
            scale *= k;
            q -= u_expand;
        }

        float rays   = (length(q.xy) - u_thickness) / scale;
        float bounds = length(p) - u_bounds;
        return max(rays, bounds);
    }

    void main(){
        vec2 uv = (gl_FragCoord.xy * 2.0 - u_resolution.xy) / u_resolution.y;
        uv += u_shake;

        // ----- camera: orbit + look toward cursor -----
        float az = u_time * u_camSpeed + u_mouse.x * 1.35;
        float el = 0.5 + u_mouse.y * 0.9;
        float rad = 3.4 * u_zoom;
        vec3 ro = vec3(sin(az)*rad, sin(el)*1.2, cos(az)*rad);

        vec3 fwd   = normalize(-ro);
        vec3 right = normalize(cross(vec3(0.0,1.0,0.0), fwd));
        vec3 up    = cross(fwd, right);

        vec2 rolled = uv * rot(sin(u_time*0.1)*0.12 + u_mouse.x*0.15);
        vec3 rd = normalize(fwd + right*rolled.x + up*rolled.y);

        float t = 0.0;
        vec3 glow = vec3(0.0);
        float rage = u_rage;

        for(int i=0; i<78; i++){
            vec3 p = ro + rd * t;
            float d = map(p);
            float r = length(p);

            // ----- infernal palette: blood -> ember -> molten gold -----
            // strictly warm ramp — flowing bands of blood -> red -> molten gold (never green)
            float drive = r*0.5 - dot(normalize(p), rd)*0.6 + u_time*0.18;
            float h = 0.5 + 0.5*sin(6.28318 * drive);
            vec3 cBlood = vec3(0.20, 0.012, 0.0);
            vec3 cRed   = vec3(0.85, 0.12, 0.02);
            vec3 cGold  = vec3(1.00, 0.55, 0.14);
            vec3 col = mix(cBlood, cRed, smoothstep(0.0, 0.55, h));
            col = mix(col, cGold, smoothstep(0.55, 1.0, h));

            // molten core that brightens & reddens with rage / as you fall in
            col += vec3(1.0, 0.35, 0.04) * (0.6 + rage + u_proximity*1.8) * exp(-r * 2.0);

            // white-hot fissures racing across the surface (faster when enraged)
            float sp = 1.5 + rage*4.0;
            float pulse = sin(p.x*12.0 - u_time*sp)
                        * sin(p.y*10.0 + u_time*sp*1.3)
                        * sin(r*12.0 - u_time*0.5);
            float sharp = pow(max(0.62, pulse), 14.0);
            col += vec3(3.2, 1.6, 0.6) * sharp * exp(-abs(d)*40.0);

            float halo = 0.006 / (0.003 + abs(d));
            float hi   = 0.001 / (0.0001 + d*d);
            glow += col * (halo + hi*0.15);

            t += d * 0.6;
            if(t > 7.5) break;
        }

        vec3 color = glow * (0.052 + rage*0.03);

        // smoldering atmosphere so the void breathes smoke instead of dying to black
        float atmo = exp(-length(uv)*0.85);
        color += vec3(0.18, 0.04, 0.01) * atmo * (0.5 + rage*0.8);
        color += vec3(0.05, 0.012, 0.004);             // faint ember floor in the corners

        // ----- THE PUPIL: a dark void at the centre that watches you -----
        // closest approach of the view ray to the eye centre (origin)
        float along = max(dot(rd, -ro), 0.0);
        vec3  near  = ro + rd*along;
        float toEye = length(near);
        // a slit / iris that turns toward the gaze direction
        float gazeAlign = dot(rd, normalize(u_gaze));
        float iris = exp(-toEye*toEye*3.0);
        // hot rim of the iris
        color += vec3(1.0, 0.5, 0.12) * iris * (0.9 + 1.6*rage) * (0.5 + 0.5*gazeAlign);
        // the black pupil itself, swelling with rage — and yawning wide open as you descend
        float pupilR = 0.22 + 0.10*sin(u_time*0.7) + rage*0.06 + u_proximity*u_proximity*0.9;
        float pupil = smoothstep(pupilR, pupilR*0.6, toEye);
        color *= 1.0 - pupil*0.92;
        // catch-light: a thin bright ring around the void
        color += vec3(1.0,0.45,0.1) * smoothstep(pupilR*1.18, pupilR, toEye)
                                     * (1.0 - smoothstep(pupilR, pupilR*0.85, toEye))
                                     * (1.2 + 2.0*rage);

        // inward fire-rays streaking toward the void — they accelerate as you fall in
        float ang = atan(uv.y, uv.x);
        float ray = pow(0.5 + 0.5*sin(ang*22.0 + u_time*2.5), 9.0);
        ray *= exp(-length(uv)*1.3) * u_proximity;
        color += vec3(1.0, 0.4, 0.08) * ray * 2.2;

        // vignette closes in the deeper you go
        color *= 1.0 - (0.34 + u_proximity*0.55) * length(uv);
        color = (color*(2.51*color+0.03)) / (color*(2.43*color+0.59)+0.14); // ACES

        // ----- rising embers -----
        vec3 embers = vec3(0.0);
        for(float i=0.0; i<90.0; i++){
            vec3 h = fract(sin(vec3(i, i*13.3, i*31.7)) * 43758.5453);
            vec3 dir = normalize(h*2.0 - 1.0);
            float radius = 1.4 + h.x*1.9;
            vec3 pos = dir*radius;
            // drift upward + swirl, faster when enraged
            pos.y += mod(u_time*(0.25 + h.x*0.5) + h.y*6.0, 5.0) - 2.5;
            pos.xz *= rot(u_time*0.15 + h.z*6.0 + rage*0.6);
            vec3 w = pos - ro;
            float proj = dot(rd, w);
            if(proj > 0.0 && proj < t){
                float dRay = length(w - rd*proj);
                float size = 0.0025 + h.z*0.022;
                float core = smoothstep(size, size*0.4, dRay);
                float g = exp(-dRay*170.0)*0.4;
                float flick = 0.6 + 0.4*sin(u_time*8.0 + i);
                embers += (core + g) * flick * vec3(1.0, 0.42, 0.12);
            }
        }
        color += embers * (0.8 + rage*1.2);

        color = pow(color, vec3(1.0/2.2));              // gamma
        gl_FragColor = vec4(color, 1.0);
    }
`;

const material = new THREE.ShaderMaterial({ vertexShader, fragmentShader, uniforms });
scene.add(new THREE.Mesh(geometry, material));

// ---------- interaction ----------
const targetMouse = new THREE.Vector2(0, 0);
let rageTarget = 0.0;
let zoomTarget = 1.0;
let shakeMag = 0.0;
let firstMove = true;

const titleEl = document.getElementById('title');
const whisperEl = document.getElementById('whisper');
let titleHidden = false;
let titleVis = 1.0;
let wasDeep = false;     // so each fresh descent picks a new truth

function setFromPointer(x, y){
    targetMouse.x = (x / innerWidth)  * 2.0 - 1.0;
    targetMouse.y = -((y / innerHeight) * 2.0 - 1.0);
    if(firstMove){ firstMove = false; }
}
window.addEventListener('pointermove', e => setFromPointer(e.clientX, e.clientY));

function enrage(){
    rageTarget = 1.0;
    shakeMag = 0.022;
    titleHidden = true;
}
window.addEventListener('pointerdown', e => { initAudio(); setFromPointer(e.clientX, e.clientY); enrage(); });
window.addEventListener('pointerup',   () => { rageTarget = 0.0; });

window.addEventListener('wheel', e => {
    // continuous + much deeper: small zoom = falling into the void
    zoomTarget = Math.min(1.7, Math.max(0.16, zoomTarget + e.deltaY * 0.0012));
}, { passive: true });

// ---------- pinch to zoom: the touch equivalent of the wheel ----------
// Spread your fingers to fall in, pinch them to climb back out. We take the
// gesture over from the browser so the page itself never zooms.
let pinchDist = 0;
function touchSpan(touches){
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.hypot(dx, dy);
}
window.addEventListener('touchstart', e => {
    if(e.touches.length === 2){ initAudio(); pinchDist = touchSpan(e.touches); }
}, { passive: false });
window.addEventListener('touchmove', e => {
    if(e.touches.length === 2){
        e.preventDefault();                       // block the browser's own zoom
        const d = touchSpan(e.touches);
        if(pinchDist > 0 && d > 0){
            // fingers apart (d grows) -> smaller zoom -> deeper descent
            zoomTarget = Math.min(1.7, Math.max(0.16, zoomTarget * (pinchDist / d)));
        }
        pinchDist = d;
    }
}, { passive: false });
function endPinch(e){ if(e.touches.length < 2) pinchDist = 0; }
window.addEventListener('touchend', endPinch, { passive: false });
window.addEventListener('touchcancel', endPinch, { passive: false });

// iOS Safari ignores user-scalable=no and fires its own pinch gesture events.
['gesturestart','gesturechange','gestureend'].forEach(ev =>
    window.addEventListener(ev, e => e.preventDefault(), { passive: false }));

// ---------- synthesized heartbeat (Web Audio, no external files) ----------
let actx = null, master = null;
function initAudio(){
    if(actx) { if(actx.state === 'suspended') actx.resume(); return; }
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    actx = new AC();
    master = actx.createGain();
    master.gain.value = 0.0;          // eased up after first gesture
    master.connect(actx.destination);
}
// one soft, fleshy thump: low sine that drops in pitch with a fast envelope
function thump(at, freq, gain){
    if(!actx) return;
    const osc = actx.createOscillator();
    const g   = actx.createGain();
    const lp  = actx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 220;
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, at);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.5, at + 0.16);
    g.gain.setValueAtTime(0.0001, at);
    g.gain.exponentialRampToValueAtTime(gain, at + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, at + 0.22);
    osc.connect(g); g.connect(lp); lp.connect(master);
    osc.start(at); osc.stop(at + 0.3);
}
// "lub-dub" — second beat softer and slightly higher
function heartbeat(vol){
    if(!actx) return;
    const now = actx.currentTime;
    thump(now,        46, vol);
    thump(now + 0.14, 60, vol * 0.62);
}

gui.add(params, 'beatBPM', 20, 160, 1).name('Heart Rate');
const m = gui.addFolder('Sigil');
m.add(params, 'iterations', 1, 20, 1).onChange(v => uniforms.u_iterations.value = v);
m.add(params, 'rotX', 0, 6.28).onChange(v => uniforms.u_rot.value.x = v);
m.add(params, 'rotY', 0, 6.28).onChange(v => uniforms.u_rot.value.y = v);
m.add(params, 'rotZ', 0, 6.28).onChange(v => uniforms.u_rot.value.z = v);
m.add(params, 'kMult', 1, 15).onChange(v => uniforms.u_kMult.value = v);
m.add(params, 'thickness', -5, 1).onChange(v => uniforms.u_thickness.value = v);
m.add(params, 'bounds', 1, 10).onChange(v => uniforms.u_bounds.value = v);
gui.domElement.style.display = 'none';
let guiShown = false;
window.addEventListener('keydown', e => {
    if(e.key === 'g' || e.key === 'G'){
        guiShown = !guiShown;
        gui.domElement.style.display = guiShown ? '' : 'none';
    }
    if(e.key === 'h' || e.key === 'H'){
        titleHidden = !titleHidden;
    }
});

function onResize(){
    renderer.setSize(innerWidth, innerHeight);
    const dpr = renderer.getPixelRatio();
    uniforms.u_resolution.value.set(innerWidth*dpr, innerHeight*dpr);
}
window.addEventListener('resize', onResize);

// ---------- loop ----------
const clock = new THREE.Clock();
let prevPhase = 0.0;
function animate(){
    requestAnimationFrame(animate);
    const tt = clock.getElapsedTime();
    uniforms.u_time.value = tt;

    // smooth the mouse so the gaze glides
    uniforms.u_mouse.value.x += (targetMouse.x - uniforms.u_mouse.value.x) * 0.06;
    uniforms.u_mouse.value.y += (targetMouse.y - uniforms.u_mouse.value.y) * 0.06;

    // gaze direction roughly toward the cursor in world space
    uniforms.u_gaze.value.set(targetMouse.x, targetMouse.y * 0.6, -1.0).normalize();

    // rage easing (rises fast, decays slow)
    const cur = uniforms.u_rage.value;
    const ease = rageTarget > cur ? 0.10 : 0.012;
    uniforms.u_rage.value += (rageTarget - cur) * ease;

    // heartbeat — sharp systolic spike, faster with rage
    const bpm = params.beatBPM * (1.0 + uniforms.u_rage.value * 1.6 + uniforms.u_proximity.value * 1.3);
    const ph = (tt * bpm / 60.0) % 1.0;
    const beat = Math.exp(-ph*9.0) + 0.6*Math.exp(-Math.max(0.0, ph-0.18)*9.0);
    uniforms.u_pulse.value = Math.min(1.0, beat);

    // sound the heartbeat the instant the cycle restarts
    if(actx){
        // ease the master volume in once audio is unlocked
        master.gain.value += (0.5 - master.gain.value) * 0.02;
        if(ph < prevPhase){
            heartbeat(0.18 + uniforms.u_rage.value * 0.45 + uniforms.u_proximity.value * 0.4);
        }
    }
    prevPhase = ph;

    // zoom — eased
    uniforms.u_zoom.value += (zoomTarget - uniforms.u_zoom.value) * 0.06;

    // proximity: 0 far .. 1 falling into the void (smoothstep on zoom)
    const z = uniforms.u_zoom.value;
    let prox = Math.min(1, Math.max(0, (0.80 - z) / (0.80 - 0.22)));
    prox = prox * prox * (3.0 - 2.0 * prox);
    uniforms.u_proximity.value = prox;

    // pick a fresh truth each time a new descent begins
    if(prox > 0.5 && !wasDeep){
        wasDeep = true;
        whisperEl.textContent = TRUTHS[Math.floor(Math.random() * TRUTHS.length)];
    } else if(prox < 0.32){
        wasDeep = false;
    }

    // title recedes / the whisper surfaces as you descend
    titleVis += ((titleHidden ? 0 : 1) - titleVis) * 0.08;
    titleEl.style.opacity = (titleVis * Math.max(0, 1 - prox * 1.7)).toFixed(3);
    whisperEl.style.opacity = Math.max(0, Math.min(1, (prox - 0.45) / 0.35)).toFixed(3);

    // screen shake on enrage, decaying
    shakeMag *= 0.9;
    const s = shakeMag * (0.4 + uniforms.u_rage.value) * uniforms.u_pulse.value;
    uniforms.u_shake.value.set((Math.sin(tt*97.0))*s, (Math.cos(tt*89.0))*s);

    renderer.render(scene, camera);
}
animate();
</script>
</body>
