<!DOCTYPE html>
<!--
  "¿Olas o lágrimas?" — a still harbour at sunset, seen through tears.

  The image itself is untouched. Everything you see happening to it is a
  screen-space post pass: a thin film of liquid welling at the lower lid,
  bending the light (refraction), softening it (blur), fringing it with
  colour (chromatic aberration) and smearing the highlights into glare
  (bloom). The tears build and release on a slow, uneven breath; now and
  then a single one gathers and rolls, spiking the distortion as it falls.

  Drag up to fight them back, drag down to let them come. Tap to blink.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>¿Olas o lágrimas?</title>
<script src="https://cdn.counter.dev/script.js" data-id="72d92ac8-56cf-4fdd-9899-b73adbab2e4d" data-utcoffset="0"></script>
<style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #05060a; overscroll-behavior: none; }
    /* touch-action: none stops iOS Safari claiming a vertical swipe for scroll/
       pull-to-refresh, which would fire pointercancel and kill the drag. */
    #container { position: fixed; inset: 0; touch-action: none; }
    canvas { display: block; width: 100vw; height: 100vh; cursor: ns-resize; touch-action: none; }

    #title {
        position: fixed; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        pointer-events: none; z-index: 10; text-align: center; padding: 1.5rem;
        transition: opacity 4s ease 1s;
    }
    #title.gone { opacity: 0; }
    #title h1 {
        font-family: "Georgia", "Times New Roman", serif;
        font-weight: 400; font-style: italic;
        font-size: clamp(2rem, 6.5vw, 4.2rem);
        letter-spacing: 0.04em;
        color: #eef0f3;
        margin: 0;
        text-shadow: 0 2px 18px rgba(0, 0, 0, 0.9), 0 0 30px rgba(120, 150, 190, 0.4), 0 0 90px rgba(30, 40, 70, 0.5);
        opacity: 0;
        animation: bloom 5s ease forwards 0.6s;
    }
    #whisper {
        font-family: "Georgia", serif; font-style: italic;
        font-size: clamp(0.9rem, 2.3vw, 1.1rem);
        color: rgba(238, 240, 243, 0.55);
        text-shadow: 0 1px 12px rgba(0, 0, 0, 0.8);
        margin-top: 1.4rem; opacity: 0;
        animation: bloom 5s ease forwards 2.4s;
    }
    @keyframes bloom {
        from { opacity: 0; filter: blur(10px); transform: translateY(10px); }
        to   { opacity: 1; filter: blur(0);    transform: translateY(0); }
    }

    #hint {
        position: fixed; bottom: 1.4rem; left: 0; right: 0; text-align: center;
        font-family: "Courier New", monospace; font-size: 0.7rem;
        letter-spacing: 0.32em; text-transform: uppercase;
        color: rgba(238, 240, 243, 0.3); pointer-events: none; z-index: 9;
        opacity: 0; animation: bloom 3s ease forwards 6.5s;
    }
    #credits {
        position: fixed; bottom: 0.7rem; left: 0.9rem; z-index: 9;
        font-family: "Courier New", monospace; font-size: 0.62rem;
        color: rgba(238, 240, 243, 0.28);
    }
    .lil-gui { z-index: 20; --background-color: rgba(8, 9, 12, 0.92); }
</style>
</head>
<body>
    <div id="container"></div>
    <div id="title">
        <h1>¿Olas o lágrimas?</h1>
        <div id="whisper">Un momento precioso y lágrimas de alegría. Gracias, mi chica.</div>
    </div>
    <div id="hint">scroll or drag down to let them come &nbsp;·&nbsp; up to fight them back &nbsp;·&nbsp; click to blink</div>
    <div id="credits">seen through tears</div>

    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
        "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
      }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
        import GUI from 'lil-gui';

        const params = {
            dpr: Math.min(window.devicePixelRatio, 1.6),
            // --- the tear film ---
            distortion: 0.055,     // master refraction strength near the lid
            blur: 3.0,             // box-blur radius (px) where the film is thickest
            aberration: 0.55,      // colour fringing, grows with wetness
            glint: 0.5,            // how hard highlights are pushed for the bloom to catch
            poolTop: 0.62,         // y above which the film thins to nothing
            welling: 0.7,          // baseline of the welling envelope (0 dry .. 1 brimming)
            rollChance: 0.016,     // per-second chance a single tear begins to fall
            // --- look ---
            bloomStrength: 0.55,
            bloomRadius: 0.6,
            bloomThreshold: 0.72,
            exposure: 1.12,
            grain: 0.04,
            vignette: 0.9,
        };

        // URL-query overrides for tuning, e.g. ?distortion=0.09&welling=1&title=0
        const Q = new URLSearchParams(location.search);
        Object.keys(params).forEach((k) => { if (Q.has(k)) params[k] = parseFloat(Q.get(k)); });

        let camera, scene, renderer, composer, tearPass, bloomPass, finalPass;
        const clock = new THREE.Clock();

        // welling is driven toward a target by drag; a single rolling tear is a
        // travelling band of extra height that spikes the local distortion.
        const tear = { amount: params.welling, target: params.welling, blink: 0, rollY: -1, rollX: 0.5, rollT: 0 };

        // ============================================================
        //  BASE — the untouched photograph on a full-screen quad, cover-fit.
        // ============================================================
        const BASE_FRAG = `
            precision highp float;
            uniform sampler2D uPhoto;
            uniform vec2 uImgAspect;   // (imgW/imgH, screenW/screenH)
            varying vec2 vUv;
            void main(){
                // cover-fit: fill the screen, crop the long axis, keep centred
                float ia = uImgAspect.x, sa = uImgAspect.y;
                vec2 uv = vUv;
                if (sa > ia) {                       // screen wider than image
                    float s = ia / sa;
                    uv.y = (uv.y - 0.5) * s + 0.5;
                } else {                             // screen taller than image
                    float s = sa / ia;
                    uv.x = (uv.x - 0.5) * s + 0.5;
                }
                gl_FragColor = texture2D(uPhoto, uv);
            }
        `;
        const BASE_VERT = `varying vec2 vUv; void main(){ vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }`;
        let baseMat;

        // ============================================================
        //  TEAR PASS — refraction / blur / fringing driven by a fluid film.
        // ============================================================
        const TearShader = {
            uniforms: {
                tDiffuse: { value: null },
                uTime: { value: 0 },
                uAmount: { value: 0.7 },      // 0 dry .. 1 brimming
                uBlink: { value: 0 },         // 1 at the instant of a blink, fading out
                uRollY: { value: -1 },        // y of a falling tear (<0 = none)
                uRollX: { value: 0.5 },       // x the falling tear runs down
                uResolution: { value: new THREE.Vector2(1, 1) },
                uDistortion: { value: params.distortion },
                uBlur: { value: params.blur },
                uAberration: { value: params.aberration },
                uGlint: { value: params.glint },
                uPoolTop: { value: params.poolTop },
            },
            vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `
                precision highp float;
                uniform sampler2D tDiffuse;
                uniform float uTime, uAmount, uBlink, uRollY, uRollX, uDistortion, uBlur, uAberration, uGlint, uPoolTop;
                uniform vec2 uResolution;
                varying vec2 vUv;

                float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
                float noise(vec2 p){
                    vec2 i = floor(p), f = fract(p);
                    vec2 u = f * f * (3.0 - 2.0 * f);
                    return mix(mix(hash(i),            hash(i + vec2(1,0)), u.x),
                               mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), u.x), u.y);
                }
                float fbm(vec2 p){
                    float v = 0.0, a = 0.5;
                    for (int i = 0; i < 4; i++){ v += a * noise(p); p *= 2.0; a *= 0.5; }
                    return v;
                }

                // height of the tear film: a slow swell plus finer ripples, both
                // flowing downward over time, with the film pooling at the lid.
                float tearHeight(vec2 uv){
                    float big   = fbm(uv * 3.0 + vec2(0.0, -uTime * 0.14));
                    float small = fbm(uv * 9.0 + vec2(uTime * 0.05, -uTime * 0.42));
                    float h = big * 0.7 + small * 0.3;
                    // a single tear rolling down: a narrow vertical ridge near uRollY
                    if (uRollY >= 0.0) {
                        float band = exp(-pow((uv.y - uRollY) / 0.11, 2.0));    // vertical falloff
                        float col  = exp(-pow((uv.x - uRollX) / 0.16, 2.0));    // runs down its own track
                        h += band * col * 2.4;
                    }
                    return h;
                }

                void main(){
                    // pooling: the waterline itself rises with the welling amount,
                    // so filling up floods the view upward, not just harder at the lid
                    float top  = clamp(uPoolTop * (0.35 + 0.95 * uAmount), 0.04, 1.15);
                    float pool = smoothstep(top, 0.0, vUv.y);
                    float wet  = clamp(pool * (0.45 + 0.85 * uAmount) + uBlink * 0.6, 0.0, 1.5);

                    // refraction: gradient of the height field becomes a UV offset
                    float e = 1.0 / uResolution.x;
                    float hL = tearHeight(vUv - vec2(e, 0.0));
                    float hR = tearHeight(vUv + vec2(e, 0.0));
                    float hD = tearHeight(vUv - vec2(0.0, e));
                    float hU = tearHeight(vUv + vec2(0.0, e));
                    vec2 grad = vec2(hR - hL, hU - hD);
                    vec2 offset = grad * wet * uDistortion * 60.0;   // scale: gradient is tiny

                    // a blink squashes the image vertically for a moment
                    vec2 buv = vUv;
                    buv.y = mix(buv.y, 0.5 + (buv.y - 0.5) * (1.0 - 0.5 * uBlink), uBlink);

                    // chromatic aberration along the offset, growing with wetness
                    vec2 ca = offset * (0.5 + 0.6 * wet) * uAberration;
                    float r = texture2D(tDiffuse, buv + offset + ca).r;
                    float g = texture2D(tDiffuse, buv + offset     ).g;
                    float b = texture2D(tDiffuse, buv + offset - ca).b;
                    vec3 color = vec3(r, g, b);

                    // blur, blended in by wetness (thick film reads soft)
                    if (uBlur > 0.01) {
                        vec3 acc = vec3(0.0);
                        float rad = uBlur * wet / uResolution.x;
                        for (int i = -2; i <= 2; i++)
                          for (int j = -2; j <= 2; j++)
                            acc += texture2D(tDiffuse, buv + offset + vec2(float(i), float(j)) * rad).rgb;
                        acc /= 25.0;
                        color = mix(color, acc, clamp(wet * 0.85, 0.0, 1.0));
                    }

                    // glint: push the brights so the bloom pass catches them as glare
                    float lum = dot(color, vec3(0.299, 0.587, 0.114));
                    color += smoothstep(0.7, 1.0, lum) * wet * uGlint;

                    gl_FragColor = vec4(color, 1.0);
                }
            `,
        };

        // ============================================================
        //  FINAL — grain and vignette, matching the family of pieces.
        // ============================================================
        const FinalShader = {
            uniforms: {
                tDiffuse: { value: null },
                uTime: { value: 0 },
                uGrain: { value: params.grain },
                uVignette: { value: params.vignette },
            },
            vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `
                precision highp float;
                uniform sampler2D tDiffuse;
                uniform float uTime, uGrain, uVignette;
                varying vec2 vUv;
                float hash(vec2 p){
                    p = fract(p * 0.3183099 + vec2(0.71, 0.113));
                    p *= 17.0;
                    return fract(p.x * p.y * (p.x + p.y));
                }
                void main(){
                    vec3 col = texture2D(tDiffuse, vUv).rgb;
                    float g = hash(gl_FragCoord.xy + fract(uTime) * 311.7) - 0.5;
                    col += g * uGrain;
                    vec2 d = vUv - 0.5;
                    float vig = smoothstep(0.85, 0.15, dot(d, d) * uVignette);
                    col *= mix(0.5, 1.0, vig);
                    gl_FragColor = vec4(col, 1.0);
                }
            `,
        };

        function buildScene(tex) {
            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            baseMat = new THREE.ShaderMaterial({
                uniforms: {
                    uPhoto: { value: tex },
                    uImgAspect: { value: new THREE.Vector2(tex.image.width / tex.image.height, innerWidth / innerHeight) },
                },
                vertexShader: BASE_VERT,
                fragmentShader: BASE_FRAG,
                depthTest: false, depthWrite: false,
            });
            const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), baseMat);
            quad.frustumCulled = false;
            scene.add(quad);
        }

        function buildComposer() {
            composer = new EffectComposer(renderer);
            composer.setPixelRatio(params.dpr);
            composer.setSize(innerWidth, innerHeight);
            composer.addPass(new RenderPass(scene, camera));

            tearPass = new ShaderPass(TearShader);
            tearPass.uniforms.uResolution.value.set(innerWidth * params.dpr, innerHeight * params.dpr);
            composer.addPass(tearPass);

            bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight),
                params.bloomStrength, params.bloomRadius, params.bloomThreshold);
            composer.addPass(bloomPass);

            finalPass = new ShaderPass(FinalShader);
            composer.addPass(finalPass);
            composer.addPass(new OutputPass());
        }

        const setWelling = (v) => { tear.target = Math.max(0, Math.min(1.6, v)); };

        function setupControls() {
            let dragging = false, ly = 0, moved = false;
            // start a drag anywhere on the page (the canvas sits under the overlays)
            window.addEventListener('pointerdown', (e) => { dragging = true; ly = e.clientY; moved = false; });
            window.addEventListener('pointermove', (e) => {
                if (!dragging) return;
                const dy = e.clientY - ly; ly = e.clientY;
                if (Math.abs(dy) > 2) moved = true;
                // drag down -> flood upward, up -> drain away
                setWelling(tear.target + dy * 0.006);
            });
            const up = () => {
                if (dragging && !moved) tear.blink = 1;   // a tap without a drag is a blink
                dragging = false;
            };
            window.addEventListener('pointerup', up);
            window.addEventListener('pointercancel', up);
            // scroll wheel: the natural control on a mouse. down -> well up, up -> drain
            window.addEventListener('wheel', (e) => { setWelling(tear.target + e.deltaY * 0.0012); }, { passive: true });
        }

        function init() {
            const container = document.getElementById('container');
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
            renderer.setPixelRatio(params.dpr);
            renderer.setSize(innerWidth, innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = params.exposure;
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            container.appendChild(renderer.domElement);

            new THREE.TextureLoader().load('tears-assets/photo.png', (tex) => {
                tex.colorSpace = THREE.SRGBColorSpace;
                tex.anisotropy = 8;
                buildScene(tex);
                buildComposer();
                setupControls();
                setupGUI();
                if (Q.get('title') === '0') document.getElementById('title').style.display = 'none';
                setTimeout(() => document.getElementById('title').classList.add('gone'), 9000);
                window.addEventListener('resize', onResize);
                animate();
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.05);
            const t = clock.elapsedTime;

            // welling: ease toward the drag target, with a slow uneven breath on top
            tear.amount += (tear.target - tear.amount) * Math.min(1, dt * 1.4);
            const breath = 0.08 * Math.sin(t * 0.3) + 0.03 * Math.sin(t * 0.83 + 1.0);
            const amount = Math.max(0, tear.amount + breath);

            // blink decays away
            tear.blink = Math.max(0, tear.blink - dt * 3.5);

            // a single tear now and then: born at the lid, rolls down and fades.
            if (tear.rollY < 0 && Math.random() < params.rollChance * dt * 60 * (0.3 + amount)) {
                tear.rollY = 1.05; tear.rollT = 0;        // breaks free near the top of view
                // scatter around the centre: average two randoms so tracks cluster
                // mid-screen but wander to either side rather than always the middle
                tear.rollX = 0.5 + ((Math.random() + Math.random()) - 1.0) * 0.6;
            }
            if (tear.rollY >= 0) {
                tear.rollT += dt;
                tear.rollY -= dt * (0.07 + tear.rollT * 0.14);   // hangs, then falls, accelerating downward
                if (tear.rollY < -0.05) tear.rollY = -1;         // gone past the lower lid
            }

            tearPass.uniforms.uTime.value = t;
            tearPass.uniforms.uAmount.value = amount;
            tearPass.uniforms.uBlink.value = tear.blink;
            tearPass.uniforms.uRollY.value = tear.rollY;
            tearPass.uniforms.uRollX.value = tear.rollX;
            finalPass.uniforms.uTime.value = t;
            composer.render();
        }

        function onResize() {
            renderer.setSize(innerWidth, innerHeight);
            composer.setSize(innerWidth, innerHeight);
            tearPass.uniforms.uResolution.value.set(innerWidth * params.dpr, innerHeight * params.dpr);
            if (baseMat) baseMat.uniforms.uImgAspect.value.y = innerWidth / innerHeight;
        }

        function setupGUI() {
            const gui = new GUI({ title: 'olas o lágrimas' });
            const f = gui.addFolder('Tears');
            f.add(params, 'distortion', 0, 0.15, 0.002).name('Refraction').onChange((v) => tearPass.uniforms.uDistortion.value = v);
            f.add(params, 'blur', 0, 8, 0.1).name('Blur').onChange((v) => tearPass.uniforms.uBlur.value = v);
            f.add(params, 'aberration', 0, 2, 0.02).name('Fringing').onChange((v) => tearPass.uniforms.uAberration.value = v);
            f.add(params, 'glint', 0, 1.5, 0.02).name('Glint').onChange((v) => tearPass.uniforms.uGlint.value = v);
            f.add(params, 'poolTop', 0.2, 1, 0.01).name('Film top').onChange((v) => tearPass.uniforms.uPoolTop.value = v);
            f.add(tear, 'target', 0, 1.6, 0.01).name('Welling').listen();
            f.add(params, 'rollChance', 0, 0.2, 0.005).name('Roll rate');
            const look = gui.addFolder('Look');
            look.add(params, 'exposure', 0.4, 2, 0.02).onChange((v) => renderer.toneMappingExposure = v);
            look.add(params, 'bloomStrength', 0, 1.5, 0.02).onChange((v) => bloomPass.strength = v);
            look.add(params, 'bloomThreshold', 0, 1, 0.02).onChange((v) => bloomPass.threshold = v);
            look.add(params, 'grain', 0, 0.2, 0.005).onChange((v) => finalPass.uniforms.uGrain.value = v);
            look.add(params, 'vignette', 0, 2, 0.05).onChange((v) => finalPass.uniforms.uVignette.value = v);
            gui.close();
            gui.domElement.style.display = 'none';
            window.addEventListener('keydown', (e) => {
                if (e.key === 'g' || e.key === 'G') {
                    const d = gui.domElement.style;
                    d.display = d.display === 'none' ? '' : 'none';
                }
            });
        }

        init();
    </script>
</body>
</html>
